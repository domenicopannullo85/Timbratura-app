<!DOCTYPE html>
<html>
<body style="background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">

    <input type="text" id="badge" placeholder="ID Badge" style="padding: 15px; font-size: 18px; margin-bottom: 20px; color: black;">
    
    <button id="btnIngresso" 
            onclick="eseguiTimbratura()" 
            style="padding: 20px 40px; font-size: 20px; background: #22c55e; color: white; border: none; border-radius: 10px; cursor: pointer;">
        INGRESSO
    </button>

    <div id="feedback" style="margin-top: 20px; font-size: 18px; text-align: center; max-width: 80%;"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient("https://bzquqzgaaszguzcmvgbl.supabase.co", "Sb_publishable_0RTF7LZGsbwmPafqzlz1yw_SatdIruX");

        async function eseguiTimbratura() {
            const badge = document.getElementById('badge').value.trim();
            const feedback = document.getElementById('feedback');
            
            feedback.innerText = "Verifica in corso...";
            
            try {
                // 1. Cerchiamo l'operaio
                const { data, error } = await supabase
                    .from('Operai')
                    .select('*')
                    .eq('badge_id', badge)
                    .single();

                if (error) throw new Error("Database errore: " + error.message);
                if (!data || !data.approvato) throw new Error("Badge non autorizzato");

                // 2. Se trovato, inseriamo la timbratura
                const { error: insError } = await supabase
                    .from('timbrature')
                    .insert([{ badge_id: badge, tipo: 'INGRESSO', nome_operaio: data.nome }]);

                if (insError) throw new Error("Errore inserimento: " + insError.message);

                feedback.innerText = "✅ Benvenuto " + data.nome;
                document.getElementById('badge').value = "";
            } catch (err) {
                feedback.innerText = "❌ " + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
