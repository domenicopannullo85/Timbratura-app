<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminale Marcatore - Officine Lombardi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        .terminal-container {
            width: 100%;
            max-width: 400px;
            background-color: #1e293b;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            text-align: center;
        }

        .logo-area h1 {
            font-size: 20px;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .logo-area p {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #cbd5e1;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            text-align: center;
        }

        .input-field:focus {
            border-color: #38bdf8;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-ingresso {
            background-color: #22c55e;
            color: #0f172a;
        }

        .btn-ingresso:hover { background-color: #4ade80; }

        .btn-uscita {
            background-color: #ef4444;
            color: #ffffff;
        }

        .btn-uscita:hover { background-color: #f87171; }

        #statusFeedback {
            min-height: 40px;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            margin-top: 12px;
            display: none;
        }

        .feedback-success {
            background-color: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid #22c55e;
        }

        .feedback-error {
            background-color: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid #ef4444;
        }

        .footer-nav {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #334155;
        }

        .footer-nav a {
            color: #38bdf8;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="logo-area">
            <h1>Officine Lombardi</h1>
            <p>Terminale di Marcatura Presenze</p>
        </div>

        <div class="input-group">
            <label for="badgeInput">AVVICINA IL BADGE O INSERISCI ID</label>
            <input type="text" id="badgeInput" class="input-field" placeholder="Esempio: 022" autofocus autocomplete="off">
        </div>

        <div class="action-buttons">
            <button class="btn btn-ingresso" onclick="gestisciTimbratura('INGRESSO')">INGRESSO</button>
            <button class="btn btn-uscita" onclick="gestisciTimbratura('USCITA')">USCITA</button>
        </div>

        <div id="statusFeedback"></div>

        <div class="footer-nav">
            <a href="report.html">Visualizza Registro Presenze (Live) →</a>
        </div>
    </div>

    <script>
        const URL_SUPABASE = "https://bzquqzgaaszguzcmvgbl.supabase.co"; 
        const CHIAVE_SUPABASE = "Sb_publishable_0RTF7LZGsbwmPafqzlz1yw_SatdIruX";

        const clientSupabase = supabase.createClient(URL_SUPABASE, CHIAVE_SUPABASE);

        async function gestisciTimbratura(tipoStato) {
            const inputField = document.getElementById('badgeInput');
            const badgeInserito = inputField.value.trim();

            if (!badgeInserito) {
                mostraFeedback("Inserisci o scansiona un codice badge valido.", "error");
                return;
            }

            mostraFeedback("Verifica operaio in corso...", "success");

            // Cerca l'operaio gestendo sia minuscole che maiuscole del database
            let queryOperai = await clientSupabase
                .from('Operai')
                .select('*')
                .eq('badge_id', badgeInserito)
                .eq('approvato', true)
                .single();

            if (queryOperai.error) {
                queryOperai = await clientSupabase
                    .from('operai')
                    .select('*')
                    .eq('badge_id', badgeInserito)
                    .eq('approvato', true)
                    .single();
            }

            if (queryOperai.error) {
                queryOperai = await clientSupabase
                    .from('Operai')
                    .select('*')
                    .eq('Badge_id', badgeInserito)
                    .eq('approvato', true)
                    .single();
            }

            if (queryOperai.error || !queryOperai.data) {
                mostraFeedback("Badge non registrato o profilo non ancora approvato.", "error");
                inputField.value = '';
                inputField.focus();
                return;
            }

            const operaio = queryOperai.data;
            const nomeCompleto = `${operaio.nome || operaio.Nome || ''} ${operaio.cognome || operaio.Cognome || ''}`.trim();

            // Inserimento coordinato sulla tabella minuscola pulita
            const { error: erroreInserimento } = await clientSupabase
                .from('timbrature')
                .insert([
                    { 
                        badge_id: badgeInserito, 
                        tipo: tipoStato, 
                        nome_operaio: nomeCompleto 
                    }
                ]);

            if (erroreInserimento) {
                console.error("Errore salvataggio:", erroreInserimento);
                mostraFeedback("Errore di rete durante il salvataggio della timbratura.", "error");
            } else {
                mostraFeedback(`✔ ${tipoStato} registrato per ${nomeCompleto}`, "success");
                inputField.value = '';
            }

            setTimeout(() => { inputField.focus(); }, 500);
        }

        function mostraFeedback(messaggio, tipo) {
            const feedback = document.getElementById('statusFeedback');
            feedback.innerText = messaggio;
            feedback.style.display = "block";
            feedback.className = tipo === "success" ? "feedback-success" : "feedback-error";
        }
    </script>
</body>
</html>
