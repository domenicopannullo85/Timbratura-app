<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body style="background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">

    <input type="text" id="badge" placeholder="ID Badge" style="padding: 15px; font-size: 18px; margin-bottom: 20px; color: black;">
    
    <button id="btnIngresso" 
            onclick="avvia()" 
            style="padding: 20px 40px; font-size: 20px; background: #22c55e; color: white; border: none; border-radius: 10px;">
        INGRESSO
    </button>

    <div id="feedback" style="margin-top: 20px; font-size: 18px;"></div>

    <script>
        function avvia() {
            const feedback = document.getElementById('feedback');
            feedback.innerText = "Caricamento...";
            
            // Verifica se Supabase è stato caricato
            if (typeof supabase === 'undefined') {
                feedback.innerText = "Errore: Supabase non caricato!";
                return;
            }

            const client = supabase.createClient("https://bzquqzgaaszguzcmvgbl.supabase.co", "Sb_publishable_0RTF7LZGsbwmPafqzlz1yw_SatdIruX");
            feedback.innerText = "Tentativo di connessione...";

            const badge = document.getElementById('badge').value.trim();
            
            client.from('Operai').select('*').eq('badge_id', badge).single()
                .then(res => {
                    if (res.error) {
                        feedback.innerText = "Errore DB: " + res.error.message;
                    } else {
                        feedback.innerText = "Trovato: " + res.data.nome;
                    }
                })
                .catch(err => {
                    feedback.innerText = "Errore bloccante: " + err.message;
                });
        }
    </script>
</body>
</html>
