async function supaFetch(path, opts) {
  const options = opts || {};
  const res = await fetch(SUPA_URL + "/rest/v1/" + path, {
    headers: {
      "apikey": SUPA_KEY,
      "Authorization": "Bearer " + SUPA_KEY,
      "Content-Type": "application/json",
      "Prefer": options.prefer || "return=representation",
    },
    method: options.method || "GET",
    body: options.body ? JSON.stringify(options.body) : undefined,
  });
  if (!res.ok) { const e = await res.text(); console.error("Supabase error:", res.status, e); throw new Error("Errore DB (" + res.status + "): " + e); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function pad2(n) { return String(n).padStart(2, "0"); }

function msToHM(ms) {
  if (ms <= 0) return "0:00";
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return h + ":" + pad2(m);
}

function msToLabel(ms) {
  if (ms <= 0) return "0h 0m";
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return h + "h " + m + "m";
}

function nowString(d) {
  return pad2(d.getHours()) + ":" + pad2(d.getMinutes()) + ":" + pad2(d.getSeconds());
}

function dateLabel(d) {
  return DAYS_FULL[d.getDay()] + " " + d.getDate() + " " + MONTHS_IT[d.getMonth()].toLowerCase();
}

function startDay(ts) {
  const d = new Date(ts);
  d.setHours(0, 0, 0, 0);
  return d.getTime();
}

function startWeek(ts) {
  const d = new Date(ts);
  const w = d.getDay();
  d.setDate(d.getDate() - (w === 0 ? 6 : w - 1));
  d.setHours(0, 0, 0, 0);
  return d.getTime();
}

function startMonth(ts) {
  const d = new Date(ts);
  d.setDate(1);
  d.setHours(0, 0, 0, 0);
  return d.getTime();
}

function computeStats(shifts, now) {
  const tD = startDay(now);
  const tW = startWeek(now);
  const tM = startMonth(now);
  let todayMs = 0, weekMs = 0, monthMs = 0, extraMs = 0;
  for (const s of shifts) {
    const end = s.end || now;
    const dur = end - s.start;
    if (dur <= 0) continue;
    if (s.start >= tD) todayMs += dur;
    if (s.start >= tW) weekMs += dur;
    if (s.start >= tM) {
      monthMs += dur;
      if (dur > STD_MS) extraMs += dur - STD_MS;
    }
  }
  return { todayMs, weekMs, monthMs, extraMs };
}

function groupByDay(shifts) {
  const map = {};
  for (const s of shifts) {
    const k = startDay(s.start);
    if (!map[k]) map[k] = { ts: k, shifts: [] };
    map[k].shifts.push(s);
  }
  return Object.values(map).sort((a, b) => b.ts - a.ts);
}

function buildSeedShifts() {
  const now = Date.now();
  const d = new Date();
  d.setDate(1);
  d.setHours(8, 0, 0, 0);
  const seeds = [];
  for (let i = 0; i < 20; i++) {
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) {
      const s = d.getTime();
      const extra = (i % 4 === 0) ? (i % 8 === 0 ? 75 * 60000 : 30 * 60000) : 0;
      seeds.push({ start: s, end: s + 8 * 3600000 + extra });
    }
    d.setDate(d.getDate() + 1);
    if (d.getTime() > now) break;
  }
  return seeds;
}

function TabOre({ shifts }) {
  const now = Date.now();
  const { monthMs, extraMs } = computeStats(shifts, now);
  const days = groupByDay(shifts.filter(s => s.start >= startMonth(now)));
  const monthName = MONTHS_IT[new Date().getMonth()] + " " + new Date().getFullYear();

          </div>
          <h1 style={{ margin:0, fontSize:26, fontWeight:800, letterSpacing:"-0.5px" }}>Registro Ore</h1>
          <p style={{ margin:"4px 0 16px", fontSize:14, opacity:0.8 }}>{monthName}</p>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, padding:"0 16px 20px" }}>
          <div style={{ background:"rgba(255,255,255,0.12)", borderRadius:14, padding:"12px 16px" }}>
            <div style={{ fontSize:12, color:"rgba(255,255,255,0.7)", marginBottom:4 }}>Totale mese</div>
            <div style={{ fontSize:24, fontWeight:800 }}>{msToLabel(monthMs)}</div>
          </div>
          <div style={{ background:"rgba(96,165,250,0.35)", borderRadius:14, padding:"12px 16px" }}>
            <div style={{ fontSize:12, color:"rgba(255,255,255,0.7)", marginBottom:4 }}>Straordinari</div>
            <div style={{ fontSize:24, fontWeight:800 }}>{msToLabel(extraMs)}</div>
          </div>
        </div>
      </div>
      <div style={{ padding:"16px 16px 8px" }}>
        <SectionLabel text="DETTAGLIO GIORNALIERO" />
        {days.length === 0 && (
          <div style={{ color:"#94a3b8", textAlign:"center", padding:24 }}>Nessun turno registrato questo mese.</div>
        )}
        {days.map(({ ts, shifts: ds }) => {
          const d = new Date(ts);
          const label = DAYS_ABBR[d.getDay()] + " " + pad2(d.getDate()) + "/" + pad2(d.getMonth() + 1);
          const total = ds.reduce((a, s) => a + ((s.end || Date.now()) - s.start), 0);
          const extra = total > STD_MS ? total - STD_MS : 0;
          const firstIn = new Date(Math.min(...ds.map(s => s.start)));
          const allDone = ds.every(s => s.end);
          const lastOut = allDone ? new Date(Math.max(...ds.map(s => s.end))) : null;
          return (
            <Card key={ts} style={{ marginBottom:10 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div>
                  <div style={{ fontWeight:700, fontSize:15, color:"#1e293b" }}>{label}</div>
                  <div style={{ fontSize:13, color:"#64748b", marginTop:2 }}>
                    Turno {pad2(firstIn.getHours())}:{pad2(firstIn.getMinutes())} –{" "}
                    {lastOut ? pad2(lastOut.getHours()) + ":" + pad2(lastOut.getMinutes()) : "in corso"}
                  </div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontWeight:700, fontSize:18, color:"#1e3a5f" }}>{msToHM(total)}</div>
                  {extra > 0 && (
                    <span style={{ background:"#dbeafe", color:"#2563eb", fontSize:12, fontWeight:600, borderRadius:20, padding:"2px 10px", display:"inline-block", marginTop:4 }}>
                      +{msToHM(extra)} extra
                    </span>
                  )}
                </div>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// OPERAIO — Tab Ferie
// ══════════════════════════════════════════════════════════════════════════════
function TabFerie({ requests, onAddRequest }) {
  const today = new Date();
  const [vYear, setVYear] = useState(today.getFullYear());
  const [vMonth, setVMonth] = useState(today.getMonth());
  const [selDay, setSelDay] = useState(null);
  const [tipo, setTipo] = useState("Ferie");
  const [note, setNote] = useState("");
  const [sent, setSent] = useState(false);

  function goPrev() {
    if (vMonth === 0) { setVMonth(11); setVYear(y => y - 1); }
    else { setVMonth(m => m - 1); }
  }
  function goNext() {
    if (vMonth === 11) { setVMonth(0); setVYear(y => y + 1); }
    else { setVMonth(m => m + 1); }
  }

  const firstDow = new Date(vYear, vMonth, 1).getDay();
  const daysInMonth = new Date(vYear, vMonth + 1, 0).getDate();
  const offset = firstDow === 0 ? 6 : firstDow - 1;

  const reqDaySet = new Set(
    requests
      .filter(r => { const d = new Date(r.date); return d.getFullYear() === vYear && d.getMonth() === vMonth; })
      .map(r => new Date(r.date).getDate())
  );

  const todayStr = today.getFullYear() + "-" + today.getMonth() + "-" + today.getDate();

  function handleSend() {
    if (!selDay) return;
    onAddRequest({ date: new Date(vYear, vMonth, selDay).getTime(), tipo, note });
    setSent(true);
    setTimeout(() => { setSent(false); setSelDay(null); setNote(""); }, 2000);
  }

  return (
    <div>
      <PageHeader title="Richiesta Permessi" subtitle="Ferie · ROL · Malattia" />
      <div style={{ padding:"16px 16px 8px" }}>
        <Card style={{ marginBottom:12 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
            <span style={{ fontWeight:700, fontSize:17, color:"#1e293b" }}>{MONTHS_IT[vMonth]} {vYear}</span>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={goPrev} style={{ background:"#f1f5f9", border:"none", borderRadius:8, width:32, height:32, cursor:"pointer", fontSize:18 }}>‹</button>
              <button onClick={goNext} style={{ background:"#f1f5f9", border:"none", borderRadius:8, width:32, height:32, cursor:"pointer", fontSize:18 }}>›</button>
            </div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", textAlign:"center", marginBottom:8 }}>
            {DAYS_SHORT.map((d, i) => (
              <div key={i} style={{ fontSize:12, color:"#94a3b8", fontWeight:600, padding:"4px 0" }}>{d}</div>
            ))}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2 }}>
            {Array(offset).fill(null).map((_, i) => <div key={"e" + i} />)}
            {Array(daysInMonth).fill(null).map((_, i) => {
              const day = i + 1;
              const dayStr = vYear + "-" + vMonth + "-" + day;
              const isToday = dayStr === todayStr;
              const isSel = selDay === day;
              const hasReq = reqDaySet.has(day);
              return (
                <button
                  key={day}
                  onClick={() => setSelDay(day)}
                  style={{
                    border: "none", cursor: "pointer", borderRadius: "50%",
                    width: 36, height: 36, margin: "2px auto",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 14, position: "relative",
                    fontWeight: (isToday || isSel) ? 700 : 400,
                    background: isSel ? "#1e3a5f" : isToday ? "#dbeafe" : "transparent",
                    color: isSel ? "#fff" : isToday ? "#2563eb" : "#1e293b",
                  }}
                >
                  {day}
                  {hasReq && !isSel && (
                    <span style={{ position:"absolute", bottom:2, left:"50%", transform:"translateX(-50%)", width:4, height:4, borderRadius:"50%", background:"#f59e0b" }} />
                  )}
                </button>
              );
            })}
          </div>
        </Card>

        <Card style={{ marginBottom:12 }}>
          <div style={{ marginBottom:14 }}>
            <div style={{ fontWeight:600, fontSize:14, color:"#1e293b", marginBottom:8 }}>Tipo richiesta</div>
            <div style={{ position:"relative" }}>
              <select
                value={tipo}
                onChange={e => setTipo(e.target.value)}
                style={{ width:"100%", padding:"12px 16px", border:"1.5px solid #e2e8f0", borderRadius:12, fontSize:15, color:"#1e293b", background:"#fff", appearance:"none", cursor:"pointer" }}
              >
                <option>Ferie</option>
                <option>ROL</option>
                <option>Malattia</option>
                <option>Permesso</option>
                <option>Altro</option>
              </select>
              <span style={{ position:"absolute", right:14, top:"50%", transform:"translateY(-50%)", pointerEvents:"none", color:"#94a3b8", fontSize:12 }}>▼</span>
            </div>
          </div>
          <div style={{ marginBottom:16 }}>
            <div style={{ fontWeight:600, fontSize:14, color:"#1e293b", marginBottom:8 }}>
              Note <span style={{ fontWeight:400, color:"#94a3b8" }}>(opzionale)</span>
            </div>
            <textarea
              value={note}
              onChange={e => setNote(e.target.value)}
              placeholder="Es. Vacanza con la famiglia..."
              style={{ width:"100%", minHeight:90, padding:12, border:"1.5px solid #e2e8f0", borderRadius:12, fontSize:14, color:"#1e293b", fontFamily:"inherit", resize:"vertical", boxSizing:"border-box" }}
            />
          </div>
          <button
            onClick={handleSend}
            disabled={!selDay}
            style={{ width:"100%", padding:15, background:"linear-gradient(135deg,#1e3a5f,#2563eb)", color:"#fff", border:"none", borderRadius:14, fontSize:16, fontWeight:700, cursor: selDay ? "pointer" : "not-allowed", opacity: selDay ? 1 : 0.5 }}
          >
            {sent ? "✓ Inviata!" : ("+ Invia richiesta" + (selDay ? " — " + selDay + " " + MONTHS_IT[vMonth].substring(0, 3) : ""))}
          </button>
        </Card>

        {requests.length > 0 && (
          <div>
            <SectionLabel text="RICHIESTE INVIATE" />
            {[...requests].reverse().map((r, i) => {
              const d = new Date(r.date);
              return (
                <Card key={i} style={{ marginBottom:8, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div>
                    <div style={{ fontWeight:600, fontSize:14, color:"#1e293b" }}>{r.tipo}</div>
                    <div style={{ fontSize:13, color:"#64748b" }}>{d.getDate()} {MONTHS_IT[d.getMonth()]} {d.getFullYear()}</div>
                    {r.note && <div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>{r.note}</div>}
                  </div>
                  <span style={{ background:"#fef9c3", color:"#a16207", fontSize:12, fontWeight:600, borderRadius:20, padding:"3px 10px", flexShrink:0 }}>In attesa</span>
                </Card>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function AdminApprova({ requests }) {
  const [dismissed, setDismissed] = useState([]);

  const allItems = [
    ...DEMO_APPROVALS,
    ...requests.map((r, i) => ({
      id: "u" + i,
      name: EMPLOYEE_NAME + " Russo",
      tipo: r.tipo,
      date: new Date(r.date).toLocaleDateString("it-IT"),
      note: r.note

  ].filter(r => !dismissed.includes(r.id));

  function dismiss(id) {
    setDismissed(prev => [...prev, id]);

  return (
    <div>
      <PageHeader title="Approvazioni" subtitle={allItems.length + " richieste in sospeso"} />

}

const REPARTI = ["TRASFORMAZIONE", "CONFEZIONAMENTO", "REPARTO TECNICO", "UFFICI", "LOGISTICA"];

function OnboardingForm({ onSubmit, saving, dbError }) {
  const [nome, setNome] = useState("");
  const [cognome, setCognome] = useState("");
  const [email, setEmail] = useState("");
  const [reparto, setReparto] = useState("");
  const [errors, setErrors] = useState({});

  function validate() {
    const e = {};
    if (!nome.trim()) e.nome = "Campo obbligatorio";
    if (!cognome.trim()) e.cognome = "Campo obbligatorio";
    if (!email.trim() || !email.includes("@")) e.email = "Email non valida";
    if (!reparto) e.reparto = "Seleziona un reparto";
    return e;
  }

  function handleSubmit() {
    const e = validate();
    if (Object.keys(e).length > 0) { setErrors(e); return; }
    onSubmit({ nome: nome.trim(), cognome: cognome.trim(), email: email.trim(), reparto });
  }

  function field(label, value, setter, key, placeholder, type) {
    return (
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b", marginBottom: 6 }}>{label}</div>
        <input
          type={type || "text"}
          value={value}
          onChange={e => { setter(e.target.value); setErrors(prev => ({ ...prev, [key]: undefined })); }}
          placeholder={placeholder}
          style={{
            width: "100%", padding: "12px 14px", border: errors[key] ? "1.5px solid #ef4444" : "1.5px solid #e2e8f0",
            borderRadius: 12, fontSize: 15, color: "#1e293b", background: "#fff",
            boxSizing: "border-box", outline: "none"
          }}
        />
        {errors[key] && <div style={{ fontSize: 12, color: "#ef4444", marginTop: 4 }}>{errors[key]}</div>}
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "#f1f5f9", display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(160deg,#1e3a5f 0%,#2563eb 100%)", padding: "48px 24px 36px", color: "#fff", textAlign: "center" }}>
        <div style={{ width: 64, height: 64, borderRadius: "50%", background: "rgba(255,255,255,0.15)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", fontSize: 30 }}>⚙</div>
        <div style={{ fontSize: 13, opacity: 0.8, marginBottom: 8 }}>{COMPANY}</div>
        <h1 style={{ margin: 0, fontSize: 26, fontWeight: 800 }}>Benvenuto</h1>
        <p style={{ margin: "8px 0 0", fontSize: 14, opacity: 0.8 }}>Crea il tuo profilo per accedere all'app</p>
      </div>

      {/* Form */}
      <div style={{ flex: 1, padding: "24px 20px 40px" }}>
        <Card>
          <div style={{ fontSize: 16, fontWeight: 700, color: "#1e293b", marginBottom: 20 }}>Dati personali</div>
          {field("Nome", nome, setNome, "nome", "Es. Marco")}
          {field("Cognome", cognome, setCognome, "cognome", "Es. Rossi")}
          {field("Email aziendale", email, setEmail, "email", "mario.rossi@officine.it", "email")}

          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b", marginBottom: 6 }}>Reparto</div>
            <div style={{ position: "relative" }}>
              <select
                value={reparto}
                onChange={e => { setReparto(e.target.value); setErrors(prev => ({ ...prev, reparto: undefined })); }}
                style={{
                  width: "100%", padding: "12px 16px", border: errors.reparto ? "1.5px solid #ef4444" : "1.5px solid #e2e8f0",
                  borderRadius: 12, fontSize: 15, color: reparto ? "#1e293b" : "#94a3b8",
                  background: "#fff", appearance: "none", cursor: "pointer", boxSizing: "border-box"
                }}
              >
                <option value="">Seleziona reparto...</option>
                {REPARTI.map(r => <option key={r} value={r}>{r}</option>)}
              </select>
              <span style={{ position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)", pointerEvents: "none", color: "#94a3b8", fontSize: 12 }}>▼</span>
            </div>
            {errors.reparto && <div style={{ fontSize: 12, color: "#ef4444", marginTop: 4 }}>{errors.reparto}</div>}
          </div>

          {dbError && (
            <div style={{ background:"#fee2e2", border:"1px solid #fca5a5", borderRadius:10, padding:"10px 14px", marginBottom:12, fontSize:13, color:"#b91c1c" }}>
              ⚠️ {dbError}
            </div>
          )}
          <button
            onClick={handleSubmit}
            disabled={saving}
            style={{ width: "100%", padding: 15, background: saving ? "#94a3b8" : "linear-gradient(135deg,#1e3a5f,#2563eb)", color: "#fff", border: "none", borderRadius: 14, fontSize: 16, fontWeight: 700, cursor: saving ? "not-allowed" : "pointer" }}
          >
            {saving ? "⏳ Invio in corso..." : "Invia richiesta di accesso →"}
          </button>
        </Card>

        <p style={{ textAlign: "center", fontSize: 12, color: "#94a3b8", marginTop: 16 }}>
          La richiesta verrà esaminata dalla direzione prima dell'attivazione.
        </p>
      </div>
    </div>
  );
}

function generateBadgeId(nome, cognome) {
  const prefix = (nome[0] + cognome[0]).toUpperCase();
  const num = Math.floor(1000 + Math.random() * 9000);
  return prefix + "-" + num;
}

function LoadingScreen() {
  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:"linear-gradient(160deg,#1e3a5f 0%,#2563eb 100%)", color:"#fff" }}>

      <div style={{ fontWeight:700, fontSize:18 }}>Officine Lombardi</div>
      <div style={{ marginTop:20, opacity:0.7, fontSize:14 }}>Caricamento in corso...</div>
    </div>
  );
}

export default function App() {
  const [loading, setLoading] = useState(true);
  const [profile, setProfile] = useState(null);
  const [onboardStep, setOnboardStep] = useState("form");
  const [isAdmin, setIsAdmin] = useState(false);
  const [empTab, setEmpTab] = useState("turno");
  const [admTab, setAdmTab] = useState("accesso");
  const [shifts, setShifts] = useState([]);
  const [requests, setRequests] = useState([]);
  const [accessRequests, setAccessRequests] = useState([]);
  const [allProfiles, setAllProfiles] = useState([]);
  const [allLeaveRequests, setAllLeaveRequests] = useState([]);
  const [saving, setSaving] = useState(false);
  const [dbError, setDbError] = useState(null);

  // ── Init: restore session from localStorage cache ──────────────────────────
  useEffect(() => {
    async function init() {
      const cached = lsGet("profile", null);
      if (cached && cached.email) {
        try {
          const fresh = await db.getProfile(cached.email);
          if (fresh) {
            setProfile(fresh);
            if (fresh.approved) {
              const [sh, lr] = await Promise.all([
                db.getShifts(fresh.id),
                db.getLeaveRequests(fresh.id),
              ]);
              setShifts(sh.map(s => ({ ...s, start: new Date(s.start_time).getTime(), end: s.end_time ? new Date(s.end_time).getTime() : null })));
              setRequests(lr);
              setOnboardStep("home");
            } else {
              setOnboardStep("pending");
            }
          } else {
            lsSet("profile", null);
            setOnboardStep("form");
          }
        } catch(err) {
          console.error("Init error:", err);
          setProfile(cached);
          setOnboardStep(cached.approved ? "home" : "pending");
        }
      }
      setLoading(false);
    }
    init();
  }, []);

  // ── Admin: load pending profiles & leave requests ──────────────────────────
  useEffect(() => {
    if (!isAdmin) return;
    async function loadAdminData() {
      try {
        const [pending, profiles, leaves] = await Promise.all([
          db.getPendingProfiles(),
          db.getAllProfiles(),
          db.getAllLeaveRequests(),
        ]);
        setAccessRequests(pending);
        setAllProfiles(profiles);
        setAllLeaveRequests(leaves);
      } catch (e) {
        console.error("Admin load error:", e);
      }
    }
    loadAdminData();
    const interval = setInterval(loadAdminData, 15000);
    return () => clearInterval(interval);
  }, [isAdmin]);

  // ── Register new operaio ───────────────────────────────────────────────────
  async function handleRegister(data) {
    setSaving(true);
    try {
      const existing = await db.getProfile(data.email);
      if (existing) {
        setProfile(existing);
        lsSet("profile", existing);
        setOnboardStep(existing.approved ? "home" : "pending");
        return;
      }
      const newProfile = await db.createProfile({
        nome: data.nome,
        cognome: data.cognome,
        email: data.email,
        reparto: data.reparto,
        approved: false,
      });
      setProfile(newProfile);
      lsSet("profile", newProfile);
      setOnboardStep("pending");
    } catch (e) {
      setDbError("Errore connessione DB: " + e.message);
    } finally {
      setSaving(false);
    }
  }

  // ── Approve access ─────────────────────────────────────────────────────────
  async function handleApproveAccess(profileId) {
    const req = accessRequests.find(r => r.id === profileId);
    if (!req) return;
    const badgeId = generateBadgeId(req.nome, req.cognome);
    try {
      await db.approveProfile(profileId, badgeId);
      setAccessRequests(prev => prev.filter(r => r.id !== profileId));
      // If this is the current user's profile, update it
      if (profile && profile.id === profileId) {
        const updated = { ...profile, approved: true, badge_id: badgeId };
        setProfile(updated);
        lsSet("profile", updated);
        setOnboardStep("approved_splash");
      }
    } catch (e) {
      alert("Errore approvazione: " + e.message);
    }
  }

  // ── Reject access ──────────────────────────────────────────────────────────
  async function handleRejectAccess(profileId) {
    try {
      await db.deleteProfile(profileId);
      setAccessRequests(prev => prev.filter(r => r.id !== profileId));
      if (profile && profile.id === profileId) {
        setProfile(null);
        lsSet("profile", null);
        setOnboardStep("form");
      }
    } catch (e) {
      alert("Errore rifiuto: " + e.message);
    }
  }

  // ── Shifts ─────────────────────────────────────────────────────────────────
  async function devAction(action) {
    if (!profile) return;
    if (action === "in") {
      const active = shifts.find(s => !s.end);
      if (active) return;
      try {
        const s = await db.clockIn(profile.id);
        setShifts(prev => [...prev, { ...s, start: new Date(s.start_time).getTime(), end: null }]);
      } catch (e) { alert("Errore timbratura: " + e.message); }
    } else if (action === "out") {
      const active = shifts.find(s => !s.end);
      if (!active) return;
      try {
        await db.clockOut(active.id);
        setShifts(prev => prev.map(s => s.id === active.id ? { ...s, end: Date.now(), end_time: new Date().toISOString() } : s));
      } catch (e) { alert("Errore uscita: " + e.message); }
    } else if (action === "seed") {
      const seeds = buildSeedShifts();
      try {
        for (const s of seeds) {
          const row = await supaFetch("shifts", { method:"POST", body: { profile_id: profile.id, start_time: new Date(s.start).toISOString(), end_time: new Date(s.end).toISOString() } });
          setShifts(prev => [...prev, { ...row[0], start: s.start, end: s.end }]);
        }
      } catch (e) { alert("Errore seed: " + e.message); }
    } else if (action === "reset") {
      try {
        await supaFetch("shifts?profile_id=eq." + profile.id, { method:"DELETE", prefer:"return=minimal" });
        setShifts([]);
      } catch (e) { alert("Errore reset: " + e.message); }
    }
  }

  // ── Leave requests ─────────────────────────────────────────────────────────
  async function handleAddRequest(r) {
    if (!profile) return;
    try {
      const row = await db.createLeaveRequest({
        profile_id: profile.id,
        tipo: r.tipo,
        date: new Date(r.date).toISOString().split("T")[0],
        note: r.note || "",
        status: "pending",
      });
      setRequests(prev => [row, ...prev]);
    } catch (e) {
      alert("Errore richiesta: " + e.message);
    }
  }

  // ── Admin approve/reject leave ─────────────────────────────────────────────
  async function handleLeaveDecision(id, status) {
    try {
      await db.updateLeaveStatus(id, status);
      setAllLeaveRequests(prev => prev.map(r => r.id === id ? { ...r, status } : r));
    } catch (e) { alert("Errore: " + e.message); }
  }

  const ADM_TABS_FULL = [
    { id:"accesso",  icon:"🔑", label:"Accessi"   },
    { id:"presenze", icon:"👥", label:"Presenze"  },
    { id:"approva",  icon:"💼", label:"Approva"   },
    { id:"documenti",icon:"📄", label:"Documenti" },
    { id:"report",   icon:"📊", label:"Report"    },
  ];

  const pendingLeaveCount = allLeaveRequests.filter(r => r.status === "pending").length;

  // ── Admin wrapper ──────────────────────────────────────────────────────────
  function AdminWrapper() {
    return (
      <div style={{ fontFamily:"'Inter',system-ui,sans-serif", minHeight:"100vh", background:"#f1f5f9", maxWidth:430, margin:"0 auto", display:"flex", flexDirection:"column" }}>
        <AdminBanner isAdmin={true} onToggle={() => setIsAdmin(false)} />
        <div style={{ flex:1, overflowY:"auto", paddingBottom:72 }}>
          {admTab === "accesso" && (
            <div>
              <PageHeader title="Richieste di Accesso" subtitle={accessRequests.length + " in sospeso"} />
              <div style={{ padding:"16px 16px 8px" }}>
                <AdminAccessRequests
                  accessRequests={accessRequests}
                  onApprove={handleApproveAccess}
                  onReject={handleRejectAccess}
                />
              </div>
            </div>
          )}
          {admTab === "presenze" && <AdminPresenze pendingCount={pendingLeaveCount} />}
          {admTab === "approva"  && (
            <div>
              <PageHeader title="Approvazioni" subtitle={pendingLeaveCount + " richieste in sospeso"} />
              <div style={{ padding:"16px 16px 8px" }}>
                {allLeaveRequests.filter(r => r.status === "pending").length === 0 && (
                  <div style={{ color:"#94a3b8", textAlign:"center", padding:32 }}>Nessuna richiesta in sospeso.</div>
                )}
                {allLeaveRequests.filter(r => r.status === "pending").map(r => (
                  <Card key={r.id} style={{ marginBottom:12 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
                      <div style={{ fontWeight:700, fontSize:15, color:"#1e293b" }}>{r.profile_id}</div>
                      <TipoBadge tipo={r.tipo} />
                    </div>
                    <div style={{ fontSize:13, color:"#64748b", marginBottom: r.note ? 6 : 12 }}>{r.date}</div>
                    {r.note ? <div style={{ fontSize:13, color:"#475569", fontStyle:"italic", marginBottom:12 }}>"{r.note}"</div> : null}
                    <div style={{ display:"flex", gap:10 }}>
                      <button onClick={() => handleLeaveDecision(r.id, "rejected")} style={{ flex:1, background:"#fff", border:"1.5px solid #fca5a5", borderRadius:10, padding:10, fontWeight:600, fontSize:13, cursor:"pointer", color:"#ef4444" }}>✕ Rifiuta</button>
                      <button onClick={() => handleLeaveDecision(r.id, "approved")} style={{ flex:1, background:"#16a34a", border:"none", borderRadius:10, padding:10, fontWeight:600, fontSize:13, cursor:"pointer", color:"#fff" }}>✓ Approva</button>
                    </div>
                  </Card>
                ))}
              </div>
            </div>
          )}
          {admTab === "documenti" && <AdminDocumenti />}
          {admTab === "report"    && <AdminReport />}
        </div>
        <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:430, background:"#fff", borderTop:"1px solid #e2e8f0", display:"grid", gridTemplateColumns:"repeat(5,1fr)", zIndex:50 }}>
          {ADM_TABS_FULL.map(it => (
            <button key={it.id} onClick={() => setAdmTab(it.id)} style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"10px 2px 8px", background:"none", border:"none", cursor:"pointer", position:"relative", gap:2, color: admTab === it.id ? "#2563eb" : "#94a3b8" }}>
              <span style={{ fontSize: 20 }}>{it.icon}</span>
              <span style={{ fontSize: 10, fontWeight: admTab === it.id ? 700 : 400 }}>{it.label}</span>
              {admTab === it.id && <div style={{ width:4, height:4, borderRadius:"50%", background:"#2563eb", position:"absolute", bottom:3 }} />}
              {it.id === "accesso" && accessRequests.length > 0 && (
                <span style={{ position:"absolute", top:6, right:6, background:"#ef4444", color:"#fff", borderRadius:"50%", width:16, height:16, fontSize:10, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" }}>{accessRequests.length}</span>
              )}
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  if (loading) return <LoadingScreen />;
  if (isAdmin) return <AdminWrapper />;

  const adminBtn = (
    <button onClick={() => setIsAdmin(true)} style={{ width:"100%", border:"none", cursor:"pointer", padding:"13px 16px", color:"#fff", fontWeight:700, fontSize:13, display:"flex", alignItems:"center", justifyContent:"center", borderRadius:"0 0 18px 18px", background:"#1e3a5f" }}>
      <span style={{ marginRight:8 }}>👤</span>PASSA A VISUALE ADMIN
    </button>
  );

  if (onboardStep === "form") return (
    <div style={{ fontFamily:"'Inter',system-ui,sans-serif", maxWidth:430, margin:"0 auto" }}>
      {adminBtn}
      <OnboardingForm onSubmit={handleRegister} saving={saving} dbError={dbError} />
    </div>
  );

  if (onboardStep === "pending") return (
    <div style={{ fontFamily:"'Inter',system-ui,sans-serif", maxWidth:430, margin:"0 auto" }}>
      {adminBtn}
      <OnboardingPending profile={profile} />
    </div>
  );

  if (onboardStep === "approved_splash") return (
    <div style={{ fontFamily:"'Inter',system-ui,sans-serif", maxWidth:430, margin:"0 auto" }}>
      <OnboardingApproved profile={{ nome: profile.nome, cognome: profile.cognome, reparto: profile.reparto, badgeId: profile.badge_id }} onContinue={() => setOnboardStep("home")} />
    </div>
  );

  return (
    <div style={{ fontFamily:"'Inter',system-ui,sans-serif", minHeight:"100vh", background:"#f1f5f9", maxWidth:430, margin:"0 auto", display:"flex", flexDirection:"column" }}>
      <AdminBanner isAdmin={false} onToggle={() => setIsAdmin(true)} />
      <div style={{ flex:1, overflowY:"auto", paddingBottom:72 }}>
        {empTab === "turno"     && <TabTurno shifts={shifts} showDev={true} onDevAction={devAction} />}
        {empTab === "ore"       && <TabOre shifts={shifts} />}
        {empTab === "ferie"     && <TabFerie requests={requests} onAddRequest={handleAddRequest} />}
        {empTab === "documenti" && <TabDocumentiEmp />}
      </div>
      <Navbar tab={empTab} setTab={setEmpTab} items={EMP_TABS} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
