<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminale Officine Lombardi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        input { padding: 15px; font-size: 18px; border-radius: 8px; border: none; margin-bottom: 20px; width: 80%; max-width: 300px; text-align: center; }
        button { padding: 15px 30px; font-size: 18px; border-radius: 8px; border: none; cursor: pointer; margin: 5px; font-weight: bold; }
        .ingresso { background: #22c55e; }
        .uscita { background: #ef4444; color: white; }
        #messaggio { margin-top: 20px; font-size: 18px; font-weight: bold; padding: 10px; }
    </style>
</head>
<body>
    <input type="text" id="badge" placeholder="Inserisci ID (es: 022)">
    <div>
        <button class="ingresso" onclick="gestisciTimbro('INGRESSO')">INGRESSO</button>
        <button class="uscita" onclick="gestisciTimbro('USCITA')">USCITA</button>
    </div>
    <div id="messaggio"></div>

    <script>
        const supabase = supabase.createClient("https://bzquqzgaaszguzcmvgbl.supabase.co", "Sb_publishable_0RTF7LZGsbwmPafqzlz1yw_SatdIruX");

        async function gestisciTimbro(tipo) {
            const badge = document.getElementById('badge').value.trim();
            const msg = document.getElementById('messaggio');
            msg.innerText = "Verifica in corso...";

            // 1. Cerchiamo l'operaio nella tabella Operai
            const { data, error } = await supabase
                .from('Operai')
                .select('*')
                .eq('badge_id', badge)
                .single();

            if (error || !data || data.approvato !== true) {
                msg.style.color = "#ef4444";
                msg.innerText = "❌ Badge non valido o non approvato!";
                return;
            }

            // 2. Se trovato, inseriamo la timbratura nella tabella timbrature
            const { error: insError } = await supabase
                .from('timbrature')
                .insert([{ badge_id: badge, tipo: tipo, nome_operaio: data.nome + " " + data.cognome }]);

            if (insError) {
                msg.innerText = "Errore: " + insError.message;
            } else {
                msg.style.color = "#22c55e";
                msg.innerText = "✔ " + tipo + " registrato per " + data.nome;
                document.getElementById('badge').value = ""; // Pulisci campo
            }
        }
    </script>
</body>
</html>
