<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Terminale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        input { padding: 15px; font-size: 18px; border-radius: 8px; border: none; margin-bottom: 20px; width: 80%; text-align: center; }
        button { padding: 15px 30px; font-size: 18px; border-radius: 8px; border: none; background: #22c55e; cursor: pointer; color: white; font-weight: bold; }
        #feedback { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <input type="text" id="badge" placeholder="ID Badge (es: 022)">
    <button id="btnIngresso">INGRESSO</button>
    <div id="feedback"></div>

    <script>
        const supabase = supabase.createClient("https://bzquqzgaaszguzcmvgbl.supabase.co", "Sb_publishable_0RTF7LZGsbwmPafqzlz1yw_SatdIruX");

        document.getElementById('btnIngresso').addEventListener('click', async () => {
            const badge = document.getElementById('badge').value.trim();
            const feedback = document.getElementById('feedback');
            feedback.innerText = "Verifica in corso...";

            const { data, error } = await supabase.from('Operai').select('*').eq('badge_id', badge).single();

            if (error || !data || data.approvato !== true) {
                feedback.style.color = "#ef4444";
                feedback.innerText = "❌ Errore: Badge non valido o non approvato.";
            } else {
                await supabase.from('timbrature').insert([{ badge_id: badge, tipo: 'INGRESSO', nome_operaio: data.nome }]);
                feedback.style.color = "#22c55e";
                feedback.innerText = "✔ Successo! Benvenuto " + data.nome;
                document.getElementById('badge').value = "";
            }
        });
    </script>
</body>
</html>
