<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SubTracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #14213D;
    --paper: #EFEDE4;
    --gold: #A6822C;
    --gold-light: #B8935F;
    --muted: #7A7566;
    --red: #A63446;
    --ink: #1C1C1C;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); font-family: 'Inter', sans-serif; color: var(--ink); }
  input, select, textarea, button { font-family: 'Inter', sans-serif; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  .serif { font-family: 'Spectral', serif; }
  .hidden { display: none !important; }

  /* Login screen */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--navy); }
  .login-card { background: #fff; border-radius: 10px; padding: 32px 28px; width: 100%; max-width: 380px; }
  .login-title { font-family: 'Spectral', serif; font-weight: 700; font-size: 26px; color: var(--navy); margin: 0 0 4px; }
  .login-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin-bottom: 20px; }
  .field-label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 5px; }
  .field-input { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid rgba(20,33,61,0.15); font-size: 14px; margin-bottom: 14px; }
  .btn-primary { width: 100%; padding: 11px; border-radius: 6px; border: none; background: var(--navy); color: #FAF8F3; font-weight: 600; font-size: 14px; cursor: pointer; }
  .btn-secondary { width: 100%; padding: 11px; border-radius: 6px; border: 1px solid rgba(20,33,61,0.15); background: #fff; color: var(--ink); font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 8px; }
  .auth-error { color: var(--red); font-size: 13px; margin-bottom: 10px; }
  .auth-info { color: #4C7A5B; font-size: 13px; margin-bottom: 10px; }
  .auth-toggle { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
  .auth-toggle a { color: var(--gold); font-weight: 600; cursor: pointer; text-decoration: none; }

  /* App shell */
  .header { background: var(--navy); padding: 32px 20px 40px; }
  .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: flex-start; justify-content: space-between; }
  .brand-label { display: flex; align-items: center; gap: 8px; color: var(--gold); font-size: 11px; letter-spacing: 3px; margin-bottom: 4px; }
  .brand-title { font-family: 'Spectral', serif; color: #FAF8F3; font-weight: 700; font-size: 32px; margin: 0; }
  .header-right { text-align: right; color: #8895AC; font-size: 11px; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .pill-btn { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 6px; background: rgba(250,248,243,0.1); color: #FAF8F3; font-size: 11px; font-weight: 600; border: none; cursor: pointer; }
  .pill-btn.on { background: var(--gold); color: var(--navy); }

  .container { max-width: 900px; margin: -24px auto 0; padding: 0 20px 60px; }
  .card { background: #fff; border-radius: 8px; border: 1px solid rgba(20,33,61,0.08); box-shadow: 0 1px 2px rgba(0,0,0,0.05); padding: 22px; }
  .card + .card { margin-top: 20px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 640px) { .stats-grid { grid-template-columns: 1fr; } }
  .stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-family: 'Spectral', serif; font-weight: 700; color: var(--navy); font-size: 24px; }

  .upcoming-wrap { margin-top: 20px; }
  .upcoming-title { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; color: var(--red); font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }
  .upcoming-chip { display: inline-flex; align-items: center; gap: 8px; background: #fff; border: 1px solid rgba(166,52,70,0.3); border-radius: 6px; padding: 8px 12px; margin: 0 8px 8px 0; font-size: 14px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  .toolbar { margin-top: 24px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; }
  .toolbar-left { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
  .search-input { padding: 9px 12px 9px 30px; border-radius: 6px; border: 1px solid rgba(20,33,61,0.15); font-size: 13px; max-width: 220px; background: #fff; }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 9px; top: 10px; color: var(--muted); font-size: 13px; }
  .select-input { padding: 9px 12px; border-radius: 6px; border: 1px solid rgba(20,33,61,0.15); font-size: 13px; background: #fff; }
  .btn-dark { background: var(--navy); color: #FAF8F3; border: none; border-radius: 6px; padding: 9px 16px; font-weight: 600; font-size: 13px; cursor: pointer; }

  .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 20px; }
  .ticket-card { position: relative; display: flex; background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 4px 10px rgba(20,33,61,0.06); border: 1px solid rgba(20,33,61,0.08); }
  .ticket-stub { width: 40px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .ticket-stub span { writing-mode: vertical-rl; transform: rotate(180deg); font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 2px; font-weight: 600; color: #fff; }
  .ticket-divider { border-left: 2px dashed rgba(20,33,61,0.18); position: relative; }
  .ticket-divider::before, .ticket-divider::after { content: ''; position: absolute; width: 14px; height: 14px; background: var(--paper); border-radius: 50%; left: -8px; }
  .ticket-divider::before { top: -8px; }
  .ticket-divider::after { bottom: -8px; }
  .ticket-body { flex: 1; padding: 14px; }
  .ticket-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .ticket-name { font-family: 'Spectral', serif; font-weight: 700; font-size: 17px; }
  .ticket-meta { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); margin-top: 2px; }
  .icon-btn { background: none; border: none; cursor: pointer; padding: 5px; border-radius: 5px; }
  .icon-btn:hover { background: rgba(0,0,0,0.05); }
  .stamp { display: inline-block; padding: 2px 8px; border: 2px solid currentColor; border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; transform: rotate(-4deg); white-space: nowrap; }
  .ticket-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .ticket-date { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }

  .empty-state { text-align: center; padding: 40px 20px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(20,33,61,0.5); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal-box { background: #fff; border-radius: 10px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid rgba(20,33,61,0.08); }
  .modal-body { padding: 18px 20px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .form-group { margin-bottom: 14px; }
  .status-toggle { display: flex; gap: 8px; }
  .status-btn { flex: 1; padding: 9px; border-radius: 6px; border: 1px solid rgba(20,33,61,0.15); background: #fff; font-weight: 600; font-size: 13px; cursor: pointer; }
  .status-btn.active-on { background: #4C7A5B; color: #fff; border-color: #4C7A5B; }
  .status-btn.pausa-on { background: #8A8A8A; color: #fff; border-color: #8A8A8A; }
  .modal-actions { display: flex; gap: 8px; margin-top: 4px; }

  .donut-wrap { display: flex; flex-wrap: wrap; align-items: center; gap: 28px; }
  .donut { position: relative; width: 150px; height: 150px; flex-shrink: 0; border-radius: 50%; }
  .donut-hole { position: absolute; top: 20px; left: 20px; width: 110px; height: 110px; border-radius: 50%; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .legend { flex: 1; min-width: 200px; }
  .legend-row { margin-bottom: 10px; }
  .legend-top { display: flex; align-items: baseline; justify-content: space-between; font-size: 13px; }
  .legend-bar { height: 5px; border-radius: 3px; background: rgba(20,33,61,0.08); margin-top: 4px; }
  .legend-fill { height: 100%; border-radius: 3px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const SUPABASE_URL = "https://mipvdzkputgfzvqhzulq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcHZkemtwdXRnZnp2cWh6dWxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NjQ2NTEsImV4cCI6MjA5OTA0MDY1MX0.ebPvljUyA0uNYBdx8Mz6_sSkGBWQ8y82wr-fB8tqNIQ";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CATEGORIES = {
  streaming: { label: "Streaming", color: "#C1502E" },
  musica: { label: "Musica", color: "#2F6F6B" },
  cloud: { label: "Cloud", color: "#35618F" },
  palestra: { label: "Palestra", color: "#4C7A5B" },
  produttivita: { label: "Produttività", color: "#6B4C93" },
  altro: { label: "Altro", color: "#A6822C" },
};
const FREQUENCIES = {
  mensile: { label: "Mensile", months: 1 },
  trimestrale: { label: "Trimestrale", months: 3 },
  annuale: { label: "Annuale", months: 12 },
};

let state = {
  session: null,
  subs: [],
  loading: true,
  authMode: "login", // login | signup
  authError: "",
  authInfo: "",
  query: "",
  categoryFilter: "tutte",
  statusFilter: "tutti",
  modalOpen: false,
  editingId: null,
  form: emptyForm(),
  formError: "",
  notifEnabled: false,
};

function emptyForm() {
  return { name: "", category: "streaming", cost: "", frequency: "mensile", renewalDate: todayISO(), status: "attivo", notes: "" };
}
function todayISO() { return new Date().toISOString().slice(0, 10); }
function addMonths(dateStr, months) { const d = new Date(dateStr + "T00:00:00"); d.setMonth(d.getMonth() + months); return d.toISOString().slice(0, 10); }
function rollForward(dateStr, freq) {
  let d = dateStr; const months = (FREQUENCIES[freq] && FREQUENCIES[freq].months) || 1; let guard = 0;
  while (d < todayISO() && guard < 240) { d = addMonths(d, months); guard++; }
  return d;
}
function daysUntil(dateStr) {
  const today = new Date(todayISO() + "T00:00:00"); const target = new Date(dateStr + "T00:00:00");
  return Math.round((target - today) / 86400000);
}
function monthlyEquivalent(sub) { const months = (FREQUENCIES[sub.frequency] && FREQUENCIES[sub.frequency].months) || 1; return sub.cost / months; }
function formatEUR(n) { return Number(n).toLocaleString("it-IT", { style: "currency", currency: "EUR" }); }
function formatDateIt(dateStr) { const d = new Date(dateStr + "T00:00:00"); return d.toLocaleDateString("it-IT", { day: "2-digit", month: "short", year: "numeric" }); }

const app = document.getElementById("app");

function render() {
  if (!state.session) { renderLogin(); return; }
  renderApp();
}

/* ---------------- LOGIN ---------------- */
function renderLogin() {
  const isSignup = state.authMode === "signup";
  app.innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-sub">LIBRETTO ABBONAMENTI</div>
        <h1 class="login-title">${isSignup ? "Crea account" : "Accedi"}</h1>
        <div style="height:16px"></div>
        ${state.authError ? `<div class="auth-error">${state.authError}</div>` : ""}
        ${state.authInfo ? `<div class="auth-info">${state.authInfo}</div>` : ""}
        <label class="field-label">Email</label>
        <input id="auth-email" type="email" class="field-input" placeholder="tuamail@esempio.it" />
        <label class="field-label">Password</label>
        <input id="auth-password" type="password" class="field-input" placeholder="••••••••" />
        <button id="auth-submit" class="btn-primary">${isSignup ? "Registrati" : "Accedi"}</button>
        <div class="auth-toggle">
          ${isSignup ? "Hai già un account? <a id='auth-switch'>Accedi</a>" : "Non hai un account? <a id='auth-switch'>Registrati</a>"}
        </div>
      </div>
    </div>
  `;
  document.getElementById("auth-submit").onclick = handleAuthSubmit;
  document.getElementById("auth-switch").onclick = () => {
    state.authMode = isSignup ? "login" : "signup";
    state.authError = ""; state.authInfo = "";
    render();
  };
  document.getElementById("auth-password").addEventListener("keydown", (e) => { if (e.key === "Enter") handleAuthSubmit(); });
}

async function handleAuthSubmit() {
  const email = document.getElementById("auth-email").value.trim();
  const password = document.getElementById("auth-password").value;
  state.authError = ""; state.authInfo = "";
  if (!email || !password) { state.authError = "Inserisci email e password."; render(); return; }
  if (state.authMode === "signup") {
    const { error } = await sb.auth.signUp({ email, password });
    if (error) { state.authError = error.message; render(); return; }
    state.authInfo = "Registrazione effettuata. Controlla la mail per confermare l'account, poi accedi.";
    state.authMode = "login";
    render();
  } else {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { state.authError = error.message; render(); return; }
    // onAuthStateChange gestirà il render
  }
}

async function logout() {
  await sb.auth.signOut();
}

/* ---------------- DATA ---------------- */
async function loadSubs() {
  state.loading = true; render();
  const { data, error } = await sb.from("subtracker_abbonamenti").select("*").order("renewal_date", { ascending: true });
  if (!error && data) {
    state.subs = data.map((s) => ({
      id: s.id, name: s.name, category: s.category, cost: Number(s.cost), frequency: s.frequency,
      renewalDate: s.status === "pausa" ? s.renewal_date : rollForward(s.renewal_date, s.frequency),
      status: s.status, notes: s.notes || "",
    }));
  } else {
    state.subs = [];
  }
  state.loading = false;
  render();
  checkNotifications();
}

async function saveSub() {
  const parsedCost = Number(String(state.form.cost).replace(",", ".").trim());
  if (!state.form.name.trim() || !state.form.cost || isNaN(parsedCost) || parsedCost <= 0) {
    state.formError = "Inserisci nome e costo validi.";
    render();
    return;
  }
  const payload = {
    name: state.form.name.trim(), category: state.form.category, cost: parsedCost,
    frequency: state.form.frequency, renewal_date: state.form.renewalDate,
    status: state.form.status, notes: state.form.notes || "",
  };
  if (state.editingId) {
    await sb.from("subtracker_abbonamenti").update(payload).eq("id", state.editingId);
  } else {
    payload.user_id = state.session.user.id;
    await sb.from("subtracker_abbonamenti").insert(payload);
  }
  state.modalOpen = false; state.formError = "";
  await loadSubs();
}

async function deleteSub(id) {
  await sb.from("subtracker_abbonamenti").delete().eq("id", id);
  await loadSubs();
}

/* ---------------- NOTIFICATIONS ---------------- */
async function toggleNotifications() {
  if (!("Notification" in window)) return;
  if (Notification.permission === "granted") { state.notifEnabled = !state.notifEnabled; render(); return; }
  const perm = await Notification.requestPermission();
  if (perm === "granted") { state.notifEnabled = true; render(); checkNotifications(); }
}
function checkNotifications() {
  if (!state.notifEnabled || !("Notification" in window) || Notification.permission !== "granted") return;
  const key = "subtracker-notified-" + todayISO();
  let log = {};
  try { log = JSON.parse(sessionStorage.getItem(key) || "{}"); } catch (e) { log = {}; }
  state.subs.filter((s) => s.status === "attivo").forEach((s) => {
    const d = daysUntil(s.renewalDate);
    if (d >= 0 && d <= 3 && !log[s.id]) {
      try {
        new Notification("SubTracker · rinnovo in arrivo", {
          body: `${s.name} si rinnova ${d === 0 ? "oggi" : d === 1 ? "domani" : "tra " + d + " giorni"} · ${formatEUR(s.cost)}`,
        });
      } catch (e) {}
      log[s.id] = true;
    }
  });
  try { sessionStorage.setItem(key, JSON.stringify(log)); } catch (e) {}
}

/* ---------------- APP RENDER ---------------- */
function renderApp() {
  const active = state.subs.filter((s) => s.status === "attivo");
  const totalMonthly = active.reduce((sum, s) => sum + monthlyEquivalent(s), 0);
  const totalAnnual = totalMonthly * 12;
  const upcoming = active.filter((s) => { const d = daysUntil(s.renewalDate); return d >= 0 && d <= 7; })
    .sort((a, b) => daysUntil(a.renewalDate) - daysUntil(b.renewalDate));
  const categorySpend = Object.entries(CATEGORIES).map(([key, c]) => {
    const monthly = active.filter((s) => s.category === key).reduce((sum, s) => sum + monthlyEquivalent(s), 0);
    return { key, name: c.label, color: c.color, value: Math.round(monthly * 100) / 100 };
  }).filter((c) => c.value > 0).sort((a, b) => b.value - a.value);

  const filtered = state.subs
    .filter((s) => state.categoryFilter === "tutte" || s.category === state.categoryFilter)
    .filter((s) => state.statusFilter === "tutti" || s.status === state.statusFilter)
    .filter((s) => s.name.toLowerCase().includes(state.query.toLowerCase()))
    .sort((a, b) => daysUntil(a.renewalDate) - daysUntil(b.renewalDate));

  let gradCum = 0;
  const gradientStops = categorySpend.map((c) => {
    const pct = totalMonthly > 0 ? (c.value / totalMonthly) * 100 : 0;
    const start = gradCum; gradCum += pct;
    return `${c.color} ${start}% ${gradCum}%`;
  }).join(", ");

  app.innerHTML = `
    <div class="header">
      <div class="header-inner">
        <div>
          <div class="brand-label mono">📖 LIBRETTO ABBONAMENTI</div>
          <h1 class="brand-title">SubTracker</h1>
        </div>
        <div class="header-right">
          <div class="mono">${new Date().toLocaleDateString("it-IT", { day: "2-digit", month: "long", year: "numeric" })}</div>
          <button id="notif-btn" class="pill-btn ${state.notifEnabled && "Notification" in window && Notification.permission === "granted" ? "on" : ""}">🔔 ${
            "Notification" in window && Notification.permission === "denied" ? "Notifiche bloccate" : (state.notifEnabled && Notification.permission === "granted" ? "Notifiche attive" : "Attiva notifiche")
          }</button>
          <button id="logout-btn" class="pill-btn">Esci · ${state.session.user.email}</button>
        </div>
      </div>
    </div>
    <div class="container">
      <div class="card">
        <div class="stats-grid">
          <div><div class="stat-label">Spesa mensile</div><div class="stat-value">${formatEUR(totalMonthly)}</div></div>
          <div><div class="stat-label">Spesa annuale</div><div class="stat-value">${formatEUR(totalAnnual)}</div></div>
          <div><div class="stat-label">Abbonamenti attivi</div><div class="stat-value">${active.length}</div></div>
        </div>
      </div>

      ${categorySpend.length ? `
      <div class="card">
        <div class="stat-label" style="margin-bottom:14px;">📊 Spesa mensile per categoria</div>
        <div class="donut-wrap">
          <div class="donut" style="background: conic-gradient(${gradientStops});">
            <div class="donut-hole">
              <div class="mono" style="font-size:9px;color:var(--muted);letter-spacing:1px;">TOT. MESE</div>
              <div class="serif" style="font-weight:700;font-size:16px;color:var(--navy);">${formatEUR(totalMonthly)}</div>
            </div>
          </div>
          <div class="legend">
            ${categorySpend.map((c) => {
              const pct = totalMonthly > 0 ? (c.value / totalMonthly) * 100 : 0;
              return `<div class="legend-row">
                <div class="legend-top"><span><span class="dot" style="background:${c.color}"></span> ${c.name}</span><span class="mono" style="color:var(--navy);font-weight:600;">${formatEUR(c.value)}</span></div>
                <div class="legend-bar"><div class="legend-fill" style="width:${pct}%;background:${c.color}"></div></div>
              </div>`;
            }).join("")}
          </div>
        </div>
      </div>` : ""}

      ${upcoming.length ? `
      <div class="upcoming-wrap">
        <div class="upcoming-title">🔔 In scadenza nei prossimi 7 giorni</div>
        ${upcoming.map((s) => { const d = daysUntil(s.renewalDate);
          return `<div class="upcoming-chip"><span class="dot" style="background:${CATEGORIES[s.category].color}"></span><strong>${s.name}</strong><span class="mono" style="color:var(--red);font-size:11px;">${d === 0 ? "oggi" : d === 1 ? "domani" : "tra " + d + " giorni"}</span></div>`;
        }).join("")}
      </div>` : ""}

      <div class="toolbar">
        <div class="toolbar-left">
          <div class="search-wrap"><span class="search-icon">🔍</span>
            <input id="search-input" class="search-input" placeholder="Cerca abbonamento…" value="${state.query}" />
          </div>
          <select id="category-filter" class="select-input">
            <option value="tutte" ${state.categoryFilter === "tutte" ? "selected" : ""}>Tutte le categorie</option>
            ${Object.entries(CATEGORIES).map(([k, c]) => `<option value="${k}" ${state.categoryFilter === k ? "selected" : ""}>${c.label}</option>`).join("")}
          </select>
          <select id="status-filter" class="select-input">
            <option value="tutti" ${state.statusFilter === "tutti" ? "selected" : ""}>Tutti gli stati</option>
            <option value="attivo" ${state.statusFilter === "attivo" ? "selected" : ""}>Attivo</option>
            <option value="pausa" ${state.statusFilter === "pausa" ? "selected" : ""}>In pausa</option>
          </select>
        </div>
        <button id="new-sub-btn" class="btn-dark">+ Nuovo abbonamento</button>
      </div>

      ${state.loading ? `<div class="empty-state">Caricamento…</div>` : filtered.length === 0 ? `
        <div class="card empty-state">
          <p class="serif" style="font-size:18px;font-weight:600;margin-bottom:6px;">${state.subs.length === 0 ? "Nessun abbonamento ancora" : "Nessun risultato"}</p>
          <p style="color:var(--muted);font-size:14px;">${state.subs.length === 0 ? "Aggiungi il primo abbonamento per iniziare a tracciare le spese." : "Prova a modificare la ricerca o i filtri."}</p>
        </div>` : `
        <div class="list-grid">
          ${filtered.map((s) => {
            const d = daysUntil(s.renewalDate); const cat = CATEGORIES[s.category];
            let stampColor = "#4C7A5B", stampLabel = "Attivo";
            if (s.status === "pausa") { stampColor = "#8A8A8A"; stampLabel = "In pausa"; }
            else if (d <= 3) { stampColor = "#A63446"; stampLabel = "Urgente"; }
            else if (d <= 7) { stampColor = "#B8935F"; stampLabel = "In scadenza"; }
            return `<div class="ticket-card">
              <div class="ticket-stub" style="background:${cat.color}"><span>${cat.label.toUpperCase()}</span></div>
              <div class="ticket-divider"></div>
              <div class="ticket-body">
                <div class="ticket-top">
                  <div><div class="ticket-name">${s.name}</div><div class="ticket-meta">${formatEUR(s.cost)} · ${FREQUENCIES[s.frequency].label.toLowerCase()}</div></div>
                  <div style="display:flex;gap:2px;">
                    <button class="icon-btn edit-btn" data-id="${s.id}">✏️</button>
                    <button class="icon-btn delete-btn" data-id="${s.id}">🗑️</button>
                  </div>
                </div>
                <div class="ticket-bottom">
                  <span class="stamp" style="color:${stampColor}">${stampLabel}</span>
                  <span class="ticket-date">${formatDateIt(s.renewalDate)}</span>
                </div>
              </div>
            </div>`;
          }).join("")}
        </div>`}
    </div>

    ${state.modalOpen ? renderModal() : ""}
  `;

  attachAppListeners();
}

function renderModal() {
  const f = state.form; const isEdit = !!state.editingId;
  return `
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="serif" style="margin:0;font-size:18px;font-weight:700;">${isEdit ? "Modifica abbonamento" : "Nuovo abbonamento"}</h2>
        <button class="icon-btn" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        ${state.formError ? `<div class="auth-error">${state.formError}</div>` : ""}
        <div class="form-group">
          <label class="field-label">Nome</label>
          <input id="f-name" class="field-input" style="margin-bottom:0" placeholder="Netflix, Notion, Palestra…" value="${f.name}" />
        </div>
        <div class="form-row">
          <div><label class="field-label">Categoria</label>
            <select id="f-category" class="select-input" style="width:100%">
              ${Object.entries(CATEGORIES).map(([k, c]) => `<option value="${k}" ${f.category === k ? "selected" : ""}>${c.label}</option>`).join("")}
            </select>
          </div>
          <div><label class="field-label">Frequenza</label>
            <select id="f-frequency" class="select-input" style="width:100%">
              ${Object.entries(FREQUENCIES).map(([k, fr]) => `<option value="${k}" ${f.frequency === k ? "selected" : ""}>${fr.label}</option>`).join("")}
            </select>
          </div>
        </div>
        <div class="form-row">
          <div><label class="field-label">Costo (€)</label>
            <input id="f-cost" class="field-input" style="margin-bottom:0" inputmode="decimal" placeholder="9,99" value="${f.cost}" /></div>
          <div><label class="field-label">Prossimo rinnovo</label>
            <input id="f-renewal" type="date" class="field-input" style="margin-bottom:0" value="${f.renewalDate}" /></div>
        </div>
        <div class="form-group">
          <label class="field-label">Stato</label>
          <div class="status-toggle">
            <button type="button" id="f-status-attivo" class="status-btn ${f.status === "attivo" ? "active-on" : ""}">Attivo</button>
            <button type="button" id="f-status-pausa" class="status-btn ${f.status === "pausa" ? "pausa-on" : ""}">In pausa</button>
          </div>
        </div>
        <div class="form-group">
          <label class="field-label">Note (opzionale)</label>
          <textarea id="f-notes" class="field-input" style="margin-bottom:0" rows="2">${f.notes}</textarea>
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" id="modal-cancel" style="margin-top:0">Annulla</button>
          <button class="btn-primary" id="modal-save">Salva</button>
        </div>
      </div>
    </div>
  </div>`;
}

function attachAppListeners() {
  document.getElementById("logout-btn").onclick = logout;
  document.getElementById("notif-btn").onclick = toggleNotifications;
  document.getElementById("search-input").oninput = (e) => { state.query = e.target.value; renderApp(); };
  document.getElementById("category-filter").onchange = (e) => { state.categoryFilter = e.target.value; renderApp(); };
  document.getElementById("status-filter").onchange = (e) => { state.statusFilter = e.target.value; renderApp(); };
  document.getElementById("new-sub-btn").onclick = () => { state.form = emptyForm(); state.editingId = null; state.formError = ""; state.modalOpen = true; renderApp(); };

  document.querySelectorAll(".edit-btn").forEach((btn) => btn.onclick = () => {
    const s = state.subs.find((x) => x.id === btn.dataset.id);
    state.form = { name: s.name, category: s.category, cost: String(s.cost), frequency: s.frequency, renewalDate: s.renewalDate, status: s.status, notes: s.notes };
    state.editingId = s.id; state.formError = ""; state.modalOpen = true; renderApp();
  });
  document.querySelectorAll(".delete-btn").forEach((btn) => btn.onclick = () => deleteSub(btn.dataset.id));

  if (state.modalOpen) {
    document.getElementById("modal-close").onclick = () => { state.modalOpen = false; renderApp(); };
    document.getElementById("modal-cancel").onclick = () => { state.modalOpen = false; renderApp(); };
    document.getElementById("f-name").oninput = (e) => { state.form.name = e.target.value; };
    document.getElementById("f-category").onchange = (e) => { state.form.category = e.target.value; };
    document.getElementById("f-frequency").onchange = (e) => { state.form.frequency = e.target.value; };
    document.getElementById("f-cost").oninput = (e) => { state.form.cost = e.target.value; };
    document.getElementById("f-renewal").onchange = (e) => { state.form.renewalDate = e.target.value; };
    document.getElementById("f-notes").oninput = (e) => { state.form.notes = e.target.value; };
    document.getElementById("f-status-attivo").onclick = () => { state.form.status = "attivo"; renderApp(); };
    document.getElementById("f-status-pausa").onclick = () => { state.form.status = "pausa"; renderApp(); };
    document.getElementById("modal-save").onclick = saveSub;
  }
}

/* ---------------- INIT ---------------- */
sb.auth.onAuthStateChange((event, session) => {
  state.session = session;
  if (session) { loadSubs(); } else { render(); }
});
sb.auth.getSession().then(({ data }) => {
  state.session = data.session;
  if (state.session) { loadSubs(); } else { render(); }
});
</script>
</body>
</html>
