<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officine Meccaniche Lombardi - Timbratura</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <div class="bg-slate-800 text-white text-center py-3 font-semibold shadow-md flex justify-center items-center gap-2 cursor-pointer" onclick="toggleVisuale()">
        <span id="btn-visuale">PASSA A VISUALE ADMIN</span>
    </div>

    <div class="flex-1 flex flex-col justify-start items-center p-4 w-full max-w-md mx-auto">
        
        <div id="vista-operaio" class="w-full space-y-6">
            <div id="schermata-registrazione" class="bg-gradient-to-b from-blue-600 to-blue-800 rounded-3xl p-6 text-white text-center shadow-xl">
                <p class="text-sm uppercase tracking-widest opacity-80 font-medium">Officine Meccaniche Lombardi S.r.l.</p>
                <h1 class="text-3xl font-bold mt-1 mb-2">Benvenuto</h1>
                <p class="text-sm text-blue-100 mb-6">Crea il tuo profilo per accedere all'app</p>

                <div class="bg-white rounded-2xl p-5 text-gray-800 text-left space-y-4 shadow-lg">
                    <h3 class="text-lg font-bold text-gray-700 border-b pb-2">Dati personali</h3>
                    
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase">Nome</label>
                        <input type="text" id="reg-nome" placeholder="Es. Domenico" class="w-full mt-1 p-3 border rounded-xl bg-gray-50 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase">Cognome</label>
                        <input type="text" id="reg-cognome" placeholder="Es. Pannullo" class="w-full mt-1 p-3 border rounded-xl bg-gray-50 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase">Email aziendale</label>
                        <input type="email" id="reg-email" placeholder="mario.rossi@officine.it" class="w-full mt-1 p-3 border rounded-xl bg-gray-50 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase">Reparto</label>
                        <select id="reg-reparto" class="w-full mt-1 p-3 border rounded-xl bg-gray-50 font-medium text-gray-700">
                            <option value="TRASFORMAZIONE">TRASFORMAZIONE</option>
                            <option value="CONFEZIONAMENTO">CONFEZIONAMENTO</option>
                            <option value="REPARTO TECNICO">REPARTO TECNICO</option>
                            <option value="UFFICI">UFFICI</option>
                            <option value="LOGISTICA">LOGISTICA</option>
                        </select>
                    </div>

                    <button onclick="inviaRichiesta()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition shadow-md mt-4 uppercase text-sm">
                        Invia Richiesta d'Iscrizione
                    </button>
                </div>
            </div>

            <div id="schermata-attesa" class="hidden bg-white rounded-3xl p-8 text-center shadow-xl border border-gray-100 space-y-6">
                <h2 class="text-2xl font-bold text-gray-800">Richiesta Inviata</h2>
                <p class="text-gray-500 mt-2 px-4">Il tuo profilo è in fase di verifica. L'amministratore assegnerà a breve il tuo badge aziendale.</p>
            </div>
        </div>

        <div id="vista-admin" class="w-full hidden space-y-6">
            <h2 class="text-2xl font-bold text-gray-800">Pannello Direzione</h2>
            <div class="bg-white rounded-2xl p-5 shadow-md border border-gray-100 text-center py-6 text-gray-400 text-sm">
                Pannello di controllo attivo.
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://iyvdxbbywumwzshwunse.supabase.co";
        const SUPABASE_KEY = "eyJhY2Nlc3NfVGNva2VuX3R5cGUiOiJhY2Nlc3MiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5dmR4YmJ5d3Vtd3pzaHd1bnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMxMzU2MTYsImV4cCI6MjA1ODcxMTYxNn0.p4lwBT2HWVEGge8lQvYu_rA1kO4WFxtbvCFDe1kRxeY";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let vistaAttuale = "operaio";

        async function inviaRichiesta() {
            const nome = document.getElementById("reg-nome").value.trim();
            const cognome = document.getElementById("reg-cognome").value.trim();
            const email = document.getElementById("reg-email").value.trim();
            const reparto = document.getElementById("reg-reparto").value;

            if (!nome || !cognome || !email) {
                alert("Per favore, compila tutti i campi richiesti!");
                return;
            }

            try {
                // NOTA: Qui puntiamo a 'Operai' con la O maiuscola!
                const { data, error } = await supabaseClient
                    .from('Operai')
                    .insert([{ 
                        nome: nome.toUpperCase(), 
                        cognome: cognome.toUpperCase(), 
                        email: email, 
                        reparto: reparto,
                        approvato: false 
                    }])
                    .select();

                if (error) {
                    alert("Errore Supabase: " + error.message);
                } else {
                    document.getElementById("schermata-registrazione").classList.add("hidden");
                    document.getElementById("schermata-attesa").classList.remove("hidden");
                }
            } catch (err) {
                alert("Errore di rete: " + err.message);
            }
        }

        function toggleVisuale() {
            const btn = document.getElementById("btn-visuale");
            const vOperaio = document.getElementById("vista-operaio");
            const vAdmin = document.getElementById("vista-admin");
            if (vistaAttuale === "operaio") {
                vistaAttuale = "admin";
                btn.innerText = "PASSA A VISUALE OPERAIO";
                vOperaio.classList.add("hidden");
                vAdmin.classList.remove("hidden");
            } else {
                vistaAttuale = "operaio";
                btn.innerText = "PASSA A VISUALE ADMIN";
                vAdmin.classList.add("hidden");
                vOperaio.classList.remove("hidden");
            }
        }
    </script>
</body>
</html>
