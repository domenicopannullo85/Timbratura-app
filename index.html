<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Terminale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <input type="text" id="badge" placeholder="022">
    <button onclick="eseguiTimbro('INGRESSO')">INGRESSO</button>
    <div id="feedback"></div>

    <script>
        const supabase = supabase.createClient("https://bzquqzgaaszguzcmvgbl.supabase.co", "Sb_publishable_0RTF7LZGsbwmPafqzlz1yw_SatdIruX");

        async function eseguiTimbro(tipo) {
            const badge = document.getElementById('badge').value.trim();
            const feedback = document.getElementById('feedback');
            feedback.innerText = "In lavorazione...";

            try {
                // Controllo immediato
                const { data, error } = await supabase
                    .from('Operai')
                    .select('*')
                    .eq('badge_id', badge)
                    .single();

                if (error || !data) throw new Error("Badge non trovato");
                if (data.approvato !== true) throw new Error("Operaio non approvato");

                // Scrittura
                await supabase.from('timbrature').insert([{ badge_id: badge, tipo: tipo, nome_operaio: data.nome }]);
                feedback.innerText = "Registrato con successo!";
            } catch (err) {
                feedback.innerText = "Errore: " + err.message;
            }
        }
    </script>
</body>
</html>
