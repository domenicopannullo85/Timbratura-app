<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Pannello Admin - Officine Lombardi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>
    <h1>Timbrature in attesa di approvazione</h1>
    <table id="adminTable">
        <thead><tr><th>ID</th><th>Nome</th><th>Azione</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        const supabaseUrl = 'https://bzquqzgaaszguzcmvgbl.supabase.co';
        const supabaseKey = 'INSERISCI_QUI_LA_TUA_CHIAVE_API_PUBBLICA'; 
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function caricaDati() {
            const { data, error } = await supabase
                .from('timbrature')
                .select('*')
                .eq('approvato', false);

            if (error) { console.error("Errore:", error); return; }

            const tbody = document.querySelector('#adminTable tbody');
            tbody.innerHTML = '';
            data.forEach(item => {
                const row = `<tr><td>${item.id}</td><td>${item.nome_operaio}</td><td><button>Approva</button></td></tr>`;
                tbody.innerHTML += row;
            });
        }
        caricaDati();
    </script>
</body>
</html>
