<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Pannello Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1 id="status">Caricamento in corso...</h1>
    <table id="adminTable" border="1">
        <thead><tr><th>ID</th><th>Nome</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        // Aspettiamo che tutto sia pronto
        window.addEventListener('load', async () => {
            const status = document.getElementById('status');
            
            try {
                const supabaseUrl = 'https://bzquqzgaaszguzcmvgbl.supabase.co';
                const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6cXVxemdhYXN6Z3V6Y212Z2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjI4NjUsImV4cCI6MjA5NjY5ODg2NX0.p4lwBT2HWVEGge8LqVYu_rA1kO4WFxtbvCFDe1kRxeY';
                
                // Inizializziamo qui DENTRO
                const supabase = supabase.createClient(supabaseUrl, supabaseKey);
                
                status.innerText = "Connessione in corso...";
                
                const { data, error } = await supabase.from('timbrature').select('*');
                
                if (error) throw error;
                
                status.innerText = "Dati caricati: " + (data ? data.length : 0);
                
                const tbody = document.querySelector('#adminTable tbody');
                data.forEach(item => {
                    tbody.innerHTML += `<tr><td>${item.id}</td><td>${item.nome_operaio}</td></tr>`;
                });
                
            } catch (err) {
                status.innerText = "Errore: " + err.message;
            }
        });
    </script>
</body>
</html>
