<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Pannello Admin - Officine Lombardi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        button { padding: 8px 16px; cursor: pointer; background: #22c55e; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #16a34a; }
    </style>
</head>
<body>
    <h1>Timbrature in attesa di approvazione</h1>
    <table id="adminTable">
        <thead>
            <tr><th>ID</th><th>Data/Ora</th><th>Azione</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        // La tua URL Supabase
        const supabaseUrl = 'https://bzquqzgaaszguzcmvgbl.supabase.co';
        // Inserisci qui la tua Anon Key (presa dal progetto Supabase > Project Settings > API)
        const supabaseKey = 'TUA_ANON_KEY_QUI';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function caricaDati() {
            // Legge solo le righe dove approvato è FALSE
            const { data, error } = await supabase
                .from('timbrature')
                .select('*')
                .eq('approvato', false)
                .order('created_at', { ascending: false });

            const tbody = document.querySelector('#adminTable tbody');
            tbody.innerHTML = '';
            
            if (data && data.length > 0) {
                data.forEach(item => {
                    tbody.innerHTML += `<tr>
                        <td>${item.id}</td>
                        <td>${new Date(item.created_at).toLocaleString()}</td>
                        <td><button onclick="approva(${item.id})">Approva</button></td>
                    </tr>`;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="3">Nessuna timbratura in attesa.</td></tr>';
            }
        }

        async function approva(id) {
            // Imposta approvato a TRUE
            const { error } = await supabase
                .from('timbrature')
                .update({ approvato: true })
                .eq('id', id);
            
            if (error) {
                alert("Errore nell'approvazione: " + error.message);
            } else {
                caricaDati(); // Ricarica la lista dopo l'azione
            }
        }

        caricaDati();
    </script>
</body>
</html>
