<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Officine Lombardi - Gestione Presenze</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px 12px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background-color: #1e293b;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: #94a3b8;
        }

        .nav-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
            background-color: #111827;
            color: #94a3b8;
            border: 1px solid #334155;
        }

        .tab-btn.active {
            background-color: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .data-card {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #38bdf8;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .operaio-name {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }

        .badge-status {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 20px;
            background-color: #1e293b;
        }

        .status-ingresso {
            color: #4ade80;
            border: 1px solid #22c55e;
        }

        .status-uscita {
            color: #f87171;
            border: 1px solid #ef4444;
        }

        .card-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 13px;
            color: #94a3b8;
        }

        .time-highlight {
            color: #38bdf8;
            font-weight: 600;
        }

        .reparto-badge {
            font-size: 11px;
            font-weight: 600;
            background-color: #334155;
            color: #cbd5e1;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .no-data {
            text-align: center;
            padding: 30px 10px;
            color: #94a3b8;
            font-size: 14px;
            font-style: italic;
        }

        .footer-links {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #334155;
            font-size: 12px;
        }

        .footer-links a {
            color: #64748b;
            text-decoration: none;
        }
        
        .footer-links a:hover {
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Registro Officine Lombardi</h1>
            <p>Monitoraggio presenze e anagrafica operai</p>
        </div>

        <div class="nav-tabs">
            <button id="btn-live" class="tab-btn active" onclick="switchTab('live-tab')">🔴 LIVE TIMBRATURE</button>
            <button id="btn-operai" class="tab-btn" onclick="switchTab('operai-tab')">👥 ELENCO OPERAI</button>
        </div>

        <div id="live-tab" class="tab-content active">
            <div id="liveContainer">
                <div class="no-data">Caricamento in corso...</div>
            </div>
        </div>

        <div id="operai-tab" class="tab-content">
            <div id="operaiContainer">
                <div class="no-data">Caricamento in corso...</div>
            </div>
        </div>

        <div class="footer-links">
            <a href="admin.html">← Richieste Approvazione</a>
            <a href="index.html">Terminale Marcatore →</a>
        </div>
    </div>

    <script>
        // Configurazione delle credenziali Supabase allineate alla tua API Key corretta
        const URL_SUPABASE = "https://bzquqzgaaszguzcmvgbl.supabase.co"; 
        const CHIAVE_SUPABASE = "Sb_publishable_0RTF7LZGsbwmPafqzlz1yw_SatdIruX";

        const clientSupabase = supabase.createClient(URL_SUPABASE, CHIAVE_SUPABASE);

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            
            if (tabId === 'live-tab') {
                document.getElementById('btn-live').classList.add('active');
                caricaTimbratureLive();
            } else if (tabId === 'operai-tab') {
                document.getElementById('btn-operai').classList.add('active');
                caricaElencoOperai();
            }
        }

        // 1. Lettura timbrature reali (Tabella 'timbrature' o 'Timbrature')
        async function caricaTimbratureLive() {
            const container = document.getElementById('liveContainer');
            
            // Tentativo di lettura primario sulla tabella minuscola
            let risultato = await clientSupabase
                .from('timbrature')
                .select('*')
                .order('created_at', { ascending: false });

            // Se fallisce per il nome tabella, proviamo la variante con la maiuscola
            if (risultato.error) {
                risultato = await clientSupabase
                    .from('Timbrature')
                    .select('*')
                    .order('created_at', { ascending: false });
            }

            if (risultato.error) {
                console.error("Errore Supabase Timbrature:", risultato.error);
                container.innerHTML = `<div class="no-data" style="color: #f87171;">
                    Errore caricamento tabella timbrature.<br>
                    <small style="color: #64748b; font-size: 11px;">Dettaglio: ${risultato.error.message}</small>
                </div>`;
                return;
            }

            const data = risultato.data;

            if (!data || data.length === 0) {
                container.innerHTML = '<div class="no-data">Nessuna timbratura registrata nel database.</div>';
                return;
            }

            container.innerHTML = '';
            data.forEach(timb => {
                const dataOra = new Date(timb.created_at);
                const oraLeggibile = dataOra.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                const giornoLeggibile = dataOra.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: '2-digit' });
                
                const classeStato = (timb.tipo && timb.tipo.toUpperCase() === 'INGRESSO') ? 'status-ingresso' : 'status-uscita';
                
                // Tolleranza per i nomi delle colonne maiuscole/minuscole nel DB
                const badgeMostrato = timb.badge_id || timb.Badge_id || 'N/D';
                const nomeMostrato = timb.nome_operaio || timb.Nome_operaio || 'Operaio';

                const cardHtml = `
                    <div class="data-card" style="border-left-color: ${(timb.tipo && timb.tipo.toUpperCase() === 'INGRESSO') ? '#22c55e' : '#ef4444'};">
                        <div class="card-header">
                            <span class="operaio-name">${nomeMostrato}</span>
                            <span class="badge-status ${classeStato}">${timb.tipo || 'INFO'}</span>
                        </div>
                        <div class="card-details">
                            <span>Codice Badge: <strong style="color: #38bdf8; font-size: 14px;">ID: ${badgeMostrato}</strong></span>
                            <span>Eseguito il ${giornoLeggibile} alle <span class="time-highlight">${oraLeggibile}</span></span>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // 2. Lettura anagrafica (Tabella 'Operai' o 'operai')
        async function caricaElencoOperai() {
            const container = document.getElementById('operaiContainer');
            
            let risultato = await clientSupabase.from('Operai').select('*');

            if (risultato.error) {
                risultato = await clientSupabase.from('operai').select('*');
            }

            if (risultato.error) {
                console.error("Errore Supabase Operai:", risultato.error);
                container.innerHTML = `<div class="no-data" style="color: #f87171;">
                    Errore tabella Operai.<br>
                    <small style="color: #64748b; font-size: 11px;">Dettaglio: ${risultato.error.message}</small>
                </div>`;
                return;
            }

            const data = risultato.data;

            if (!data || data.length === 0) {
                container.innerHTML = '<div class="no-data">Nessun operaio presente in anagrafica.</div>';
                return;
            }

            container.innerHTML = '';
            data.forEach(operaio => {
                const badgeOperaio = operaio.badge_id || operaio.Badge_id || 'Non assegnato';
                const approvatoStato = operaio.approvato === true ? 'ATTIVO' : 'IN ATTESA';
                const borderCardColor = operaio.approvato === true ? '#38bdf8' : '#64748b';
                const nomeCompleto = `${operaio.nome || operaio.Nome || ''} ${operaio.cognome || operaio.Cognome || ''}`;

                const cardHtml = `
                    <div class="data-card" style="border-left-color: ${borderCardColor};">
                        <div class="card-header">
                            <span class="operaio-name">${nomeCompleto}</span>
                            <span class="reparto-badge">${operaio.reparto || 'OFFICINA'}</span>
                        </div>
                        <div class="card-details">
                            <span>Codice Badge Associato: <strong style="color: #fff;">ID: ${badgeOperaio}</strong></span>
                            <span>Stato Profilo: <strong style="color: ${operaio.approvato ? '#4ade80' : '#cbd5e1'};">${approvatoStato}</strong></span>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            caricaTimbratureLive();
        });
    </script>
</body>
</html>
